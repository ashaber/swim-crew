<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0d0d">
  <title>swim-crew</title>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #1c1c1e;
      --surface2: #2c2c2e;
      --border: #3a3a3c;
      --text: #ffffff;
      --text2: rgba(235,235,245,0.6);
      --accent: #0a84ff;
      --green: #30d158;
      --red: #ff453a;
      --nav-h: 60px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
    #app { max-width: 480px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }

    #race-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; position: sticky; top: 0; z-index: 20; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .header-title { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; }
    #stop-swim-btn { background: var(--red); color: #fff; border: none; border-radius: 8px; font-size: 11px; font-weight: 900; letter-spacing: 0.1em; padding: 5px 14px; cursor: pointer; flex-shrink: 0; }
    #stop-swim-btn:active { opacity: 0.7; }
    .clock-row { display: flex; gap: 6px; }
    .clock-item { flex: 1; background: var(--surface2); border-radius: 10px; padding: 6px 8px; text-align: center; }
    .clock-label { font-size: 9px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 3px; }
    .clock-value { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; color: var(--text); }
    .cv-accent { color: var(--accent); }
    .cv-green { color: var(--green); }
    .cv-red { color: var(--red); }

    .tab-panel { display: none; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 8px); }
    .tab-panel.active { display: block; }

    .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; height: calc(var(--nav-h) + env(safe-area-inset-bottom)); background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 20; padding-bottom: env(safe-area-inset-bottom); }
    .nav-btn { flex: 1; background: none; border: none; color: var(--text2); font-size: 10px; font-weight: 500; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn svg { width: 22px; height: 22px; }

    .feed-hero { padding: 14px 14px 0; }

    #start-swim-btn { width: 100%; background: var(--green); color: #000; border: none; border-radius: 14px; font-size: 18px; font-weight: 800; letter-spacing: 0.05em; padding: 18px; cursor: pointer; text-transform: uppercase; margin-bottom: 10px; display: block; }
    #start-swim-btn:active { opacity: 0.82; }

    .stopped-banner { text-align: center; color: var(--red); font-size: 14px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; padding: 12px 0 10px; }
    .stopped-actions { display: flex; gap: 8px; margin-bottom: 14px; }
    .stopped-actions button { flex: 1; background: none; border: 1px solid var(--border); color: var(--text2); border-radius: 10px; font-size: 13px; font-weight: 600; padding: 10px 6px; cursor: pointer; }
    .btn-clear-data { border-color: var(--red) !important; color: var(--red) !important; }

    .add-athlete-card { background: var(--surface); border-radius: 14px; padding: 16px; margin-bottom: 14px; }
    .add-athlete-card input { width: 100%; background: var(--surface2); border: none; border-radius: 10px; color: var(--text); font-size: 15px; padding: 12px 14px; margin-bottom: 8px; font-family: inherit; }
    .add-athlete-card input::placeholder { color: var(--text2); }
    .btn-add-athlete { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; padding: 12px; cursor: pointer; }

    .swipe-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
    .swipe-arrow { background: var(--surface2); border: none; color: var(--text); font-size: 22px; width: 40px; height: 40px; border-radius: 10px; cursor: pointer; }
    .swipe-arrow:disabled { opacity: 0.3; }
    .swipe-name { font-size: 18px; font-weight: 800; flex: 1; text-align: center; }
    .swipe-target { font-size: 13px; font-weight: 400; color: var(--text2); }
    .swipe-dots { display: flex; justify-content: center; gap: 6px; margin-bottom: 10px; }
    .swipe-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); cursor: pointer; }
    .swipe-dot.active { background: var(--accent); }

    #feed-form-container { background: var(--surface); border-radius: 16px; padding: 16px; margin-bottom: 14px; }
    .form-section { margin-bottom: 16px; }
    .form-section-title { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }

    .checkbox-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
    .check-opt { display: flex; align-items: center; gap: 10px; background: var(--surface2); border-radius: 10px; padding: 11px 12px; cursor: pointer; user-select: none; border: 2px solid transparent; }
    .check-opt.checked { border-color: var(--green); background: rgba(48,209,88,0.1); }
    .check-box { width: 20px; height: 20px; border-radius: 6px; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .check-opt.checked .check-box { background: var(--green); border-color: var(--green); }
    .check-opt.checked .check-box::after { content: ''; width: 10px; height: 6px; border-left: 2.5px solid #000; border-bottom: 2.5px solid #000; transform: rotate(-45deg) translateY(-1px); display: block; }
    .check-opt-label { font-size: 13px; font-weight: 500; line-height: 1.2; }

    .stepper-row { display: flex; align-items: center; gap: 10px; }
    .stepper-value { flex: 1; background: var(--surface2); border-radius: 10px; padding: 10px; font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; text-align: center; color: var(--accent); }
    .adj-btn { background: var(--surface2); border: none; border-radius: 10px; color: var(--text); font-size: 22px; font-weight: 600; width: 48px; height: 48px; cursor: pointer; flex-shrink: 0; }
    .adj-btn:active { background: var(--border); }

    .condition-scale { display: flex; gap: 6px; }
    .cond-btn { flex: 1; background: var(--surface2); border: 2px solid transparent; border-radius: 10px; font-size: 22px; padding: 10px 2px; cursor: pointer; text-align: center; }
    .cond-btn.selected { border-color: var(--green); background: rgba(48,209,88,0.12); }

    .gps-row { display: flex; gap: 8px; margin-bottom: 8px; }
    .btn-gps { flex: 1; background: var(--surface2); border: none; border-radius: 10px; color: var(--text); font-size: 13px; font-weight: 700; padding: 12px; cursor: pointer; }
    .gps-status { font-size: 12px; color: var(--text2); margin-bottom: 8px; min-height: 16px; }
    .manual-distance-input { width: 100%; background: var(--surface2); border: none; border-radius: 10px; color: var(--text); font-size: 14px; padding: 10px 12px; font-family: inherit; }
    .manual-distance-input::placeholder { color: var(--text2); }

    .notes-input { width: 100%; background: var(--surface2); border: none; border-radius: 10px; color: var(--text); font-size: 15px; padding: 12px 14px; font-family: inherit; resize: none; min-height: 64px; }
    .notes-input::placeholder { color: var(--text2); }

    .form-actions { display: flex; gap: 8px; margin-top: 4px; }
    .btn-save { flex: 1; background: var(--green); color: #000; border: none; border-radius: 12px; font-size: 17px; font-weight: 800; padding: 15px; cursor: pointer; text-transform: uppercase; letter-spacing: 0.04em; }

    .summary-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 0 14px 12px; }
    .stat-box { background: var(--surface); border-radius: 10px; padding: 10px 6px; text-align: center; }
    .stat-val { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; color: var(--accent); }
    .stat-lbl { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 2px; }

    .feed-history { padding: 0 14px; }
    .feed-history-title { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
    .feed-row { background: var(--surface); border-radius: 12px; padding: 12px 14px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; }
    .feed-num { background: var(--accent); color: #000; width: 34px; height: 34px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; flex-shrink: 0; }
    .feed-details { flex: 1; min-width: 0; }
    .feed-time-row { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .feed-time { font-size: 18px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .feed-pace { font-size: 12px; font-weight: 700; color: var(--accent); }
    .feed-cond { font-size: 16px; line-height: 1; }
    .feed-meta { font-size: 12px; color: var(--text2); margin-top: 4px; line-height: 1.4; }
    .feed-notes-text { font-size: 13px; color: var(--text); margin-top: 4px; }
    .feed-delete { background: none; border: none; color: var(--red); font-size: 16px; cursor: pointer; padding: 4px; opacity: 0.5; flex-shrink: 0; }
    .no-feeds { color: var(--text2); font-size: 14px; text-align: center; padding: 40px 16px; }

    .checklist-header { padding: 14px 14px 6px; display: flex; align-items: center; justify-content: space-between; }
    .checklist-progress { font-size: 14px; color: var(--text2); }
    .checklist-progress strong { color: var(--accent); }
    .btn-reset { background: none; border: 1px solid var(--border); color: var(--text2); border-radius: 8px; font-size: 12px; padding: 6px 12px; cursor: pointer; }
    .checklist-section { padding: 0 12px 6px; }
    .section-header { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; padding: 12px 4px 7px; }
    .checklist-item { display: flex; align-items: flex-start; gap: 12px; padding: 10px 12px; background: var(--surface); border-radius: 10px; margin-bottom: 4px; cursor: pointer; user-select: none; }
    .checklist-item.done { opacity: 0.45; }
    .cl-check { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; }
    .checklist-item.done .cl-check { background: var(--green); border-color: var(--green); }
    .checklist-item.done .cl-check::after { content: ''; width: 10px; height: 6px; border-left: 2.5px solid #000; border-bottom: 2.5px solid #000; transform: rotate(-45deg) translateY(-1px); display: block; }
    .cl-text { font-size: 14px; line-height: 1.4; flex: 1; }
    .cl-done-divider { font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; padding: 10px 0 4px; opacity: 0.5; }

    .static-content { padding: 16px; }
    .static-content h1 { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .static-content h2 { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; margin: 20px 0 8px; }
    .static-content p { font-size: 14px; color: var(--text2); line-height: 1.5; margin-bottom: 8px; }
    .static-content ul, .static-content ol { padding-left: 20px; margin-bottom: 10px; }
    .static-content li { font-size: 14px; line-height: 1.6; margin-bottom: 2px; }
    .static-content table { width: 100%; border-collapse: collapse; margin-bottom: 10px; font-size: 13px; }
    .static-content table th { text-align: left; font-size: 10px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; padding: 6px 8px; border-bottom: 1px solid var(--border); }
    .static-content table td { padding: 8px; border-bottom: 1px solid var(--border); line-height: 1.4; vertical-align: top; }
    .static-content a { color: var(--accent); text-decoration: none; }

    .hidden { display: none !important; }

    .notes-section { padding: 12px 16px 24px; }
    .notes-label { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
    .notes-textarea { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 14px; line-height: 1.5; padding: 10px 12px; resize: none; box-sizing: border-box; min-height: 80px; font-family: inherit; }
    .notes-textarea:focus { outline: none; border-color: var(--accent); }

    .export-btn { background: none; border: 1px solid var(--border); color: var(--text2); border-radius: 10px; font-size: 12px; padding: 6px 14px; cursor: pointer; display: block; margin: 10px auto 0; }

    .tl-section { margin-bottom: 4px; }
    .tl-section-title { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; padding: 14px 16px 6px; }
    .tl-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
    .tl-item.done .tl-label { text-decoration: line-through; color: var(--text2); }
    .tl-item.done .tl-time { color: var(--border); }
    .tl-item.race-start { background: rgba(10,132,255,0.06); border-left: 3px solid var(--accent); }
    .tl-item.race-start .tl-label { color: var(--accent); font-weight: 700; }
    .tl-check { width: 22px; height: 22px; border: 2px solid var(--border); border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--green); }
    .tl-item.done .tl-check { border-color: var(--green); background: rgba(48,209,88,0.1); }
    .tl-content { flex: 1; min-width: 0; }
    .tl-label { font-size: 14px; font-weight: 500; line-height: 1.3; }
    .tl-time { font-size: 11px; color: var(--text2); margin-top: 2px; }
  </style>
</head>
<body>
<div id="app">

  <header id="race-header">
    <div class="header-top">
      <div class="header-title">swim-crew</div>
      <button id="stop-swim-btn" class="hidden" onclick="stopSwim()">STOP</button>
    </div>
    <div class="clock-row">
      <div class="clock-item">
        <div class="clock-label">Elapsed</div>
        <div class="clock-value cv-accent" id="elapsed-display">—</div>
      </div>
      <div class="clock-item">
        <div class="clock-label">Next Feed</div>
        <div class="clock-value cv-accent" id="next-feed-display">—</div>
      </div>
      <div class="clock-item">
        <div class="clock-label">Interval</div>
        <div class="clock-value cv-green" id="interval-display">—</div>
      </div>
    </div>
  </header>

  <!-- ══════════════════════════════ FEED TAB ══════════════════════════════ -->
  <div class="tab-panel active" id="panel-feed">
    <div class="feed-hero">

      <div id="prestart-ui" class="hidden">
        <button id="start-swim-btn" onclick="startSwim()">Start Swim Now</button>
      </div>

      <div id="stopped-ui" class="hidden">
        <div class="stopped-banner">Swim Stopped</div>
        <div class="stopped-actions">
          <button onclick="resumeSwim()">Resume</button>
          <button onclick="resetSwim()">Reset Timer</button>
          <button class="btn-clear-data" onclick="clearAllData()">Clear All Data</button>
        </div>
      </div>

      <div id="no-athletes-ui" class="add-athlete-card hidden">
        <div class="form-section-title">Add Athlete</div>
        <input id="new-athlete-name" placeholder="Name" />
        <input id="new-athlete-km" type="number" step="0.1" placeholder="Target distance (km, optional)" />
        <button class="btn-add-athlete" onclick="addAthlete()">Add</button>
      </div>

      <div id="feed-area" class="hidden">
        <div id="athlete-swipe"></div>
        <button id="add-athlete-toggle-btn" class="export-btn hidden" onclick="toggleAddAthleteForm()">+ Add athlete</button>

        <div id="feed-form-container">
          <div class="form-section">
            <div class="form-section-title">Given</div>
            <div class="checkbox-grid">
              <label class="check-opt" data-id="drink" onclick="toggleCheck(this)"><div class="check-box"></div><span class="check-opt-label">Sport drink</span></label>
              <label class="check-opt" data-id="water" onclick="toggleCheck(this)"><div class="check-box"></div><span class="check-opt-label">Water</span></label>
            </div>
          </div>

          <div class="form-section">
            <div class="form-section-title">Gels</div>
            <div class="stepper-row">
              <button class="adj-btn" onclick="adjustGel(-1)">−</button>
              <div class="stepper-value" id="gel-count">0</div>
              <button class="adj-btn" onclick="adjustGel(1)">+</button>
            </div>
          </div>

          <div class="form-section">
            <div class="form-section-title">Transition Time <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:10px">— 15s increments</span></div>
            <div class="stepper-row">
              <button class="adj-btn" onclick="adjustTransition(-15)">−</button>
              <div class="stepper-value" id="transition-display">0s</div>
              <button class="adj-btn" onclick="adjustTransition(15)">+</button>
            </div>
          </div>

          <div class="form-section">
            <div class="form-section-title">Athlete Condition</div>
            <div class="condition-scale" id="condition-scale">
              <button class="cond-btn" data-val="1" onclick="selectCondition(this)">😞</button>
              <button class="cond-btn" data-val="2" onclick="selectCondition(this)">😕</button>
              <button class="cond-btn" data-val="3" onclick="selectCondition(this)">😐</button>
              <button class="cond-btn" data-val="4" onclick="selectCondition(this)">🙂</button>
              <button class="cond-btn" data-val="5" onclick="selectCondition(this)">😊</button>
            </div>
          </div>

          <div class="form-section">
            <div class="form-section-title">Distance / Pace</div>
            <div class="gps-row">
              <button class="btn-gps" onclick="dropGpsPin()">📍 Drop GPS Pin</button>
            </div>
            <div class="gps-status" id="gps-status"></div>
            <input class="manual-distance-input" id="manual-distance" type="number" step="1" placeholder="Or enter cumulative distance (m) manually" />
          </div>

          <div class="form-section">
            <div class="form-section-title">Notes</div>
            <textarea class="notes-input" id="feed-notes" placeholder="Condition, issues, anything notable..." rows="2"></textarea>
          </div>

          <div class="form-actions">
            <button class="btn-save" onclick="saveFeed()">Save Feed</button>
          </div>
        </div>

        <div class="summary-stats hidden" id="feed-stats">
          <div class="stat-box"><div class="stat-val" id="stat-feeds">0</div><div class="stat-lbl">Feeds</div></div>
          <div class="stat-box"><div class="stat-val" id="stat-gels">0</div><div class="stat-lbl">Gels</div></div>
          <div class="stat-box"><div class="stat-val" id="stat-transition">—</div><div class="stat-lbl">Avg Transition</div></div>
        </div>
        <button id="export-btn" class="export-btn" onclick="exportData()">↓ Export data</button>

        <div class="feed-history" id="feed-history"></div>
      </div>
    </div>

    <div class="notes-section">
      <div class="notes-label">Swim Notes</div>
      <textarea class="notes-textarea" id="swim-notes" placeholder="Overall observations, anything to remember..." rows="3"></textarea>
    </div>
  </div>

  <!-- ══════════════════════════════ TIMELINE TAB ══════════════════════════════ -->
  <div class="tab-panel" id="panel-timeline">
    <div id="timeline-body"></div>
  </div>

  <!-- ══════════════════════════════ CHECKLIST TAB ══════════════════════════════ -->
  <div class="tab-panel" id="panel-checklist">
    <div class="checklist-header">
      <div class="checklist-progress"><strong id="cl-done">0</strong> / <span id="cl-total">0</span> complete</div>
      <button class="btn-reset" onclick="resetChecklist()">Reset all</button>
    </div>
    <div id="checklist-body"></div>
  </div>

  <!-- ══════════════════════════════ PLAN TAB ══════════════════════════════ -->
  <div class="tab-panel" id="panel-plan">
    <div id="plan-content" class="static-content"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-feed" onclick="showTab('feed')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Feed
    </button>
    <button class="nav-btn" id="nav-timeline" onclick="showTab('timeline')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Timeline
    </button>
    <button class="nav-btn" id="nav-checklist" onclick="showTab('checklist')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      Check
    </button>
    <button class="nav-btn" id="nav-plan" onclick="showTab('plan')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      Plan
    </button>
